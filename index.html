<!DOCTYPE html>
<html lang="az">
<head>
    <style>
        /* Neon Fonlar */
        body.neon { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
        body.rain { background: #000; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px); background-size: 550px 550px; }
        
        /* Yazır indikatoru */
        #typing-indicator { font-size: 12px; color: #0095f6; padding: 5px 15px; display: none; }

        /* Mesaj fonu seçimi */
        .theme-btn { padding: 5px; cursor: pointer; }
    </style>
</head>
<body class="neon">
    <div id="back-btn" style="position:fixed; top:10px; left:10px; font-size:20px; z-index:999;">←</div>

    <script>
        // Girişi yadda saxlamaq
        if(localStorage.getItem('bgl_user')) {
            myName = localStorage.getItem('bgl_user');
            authScreen.style.display = "none";
        }

        // Qeydiyyatda yadda saxla
        socket.on('auth_response', (res) => {
            if(res.success) {
                localStorage.setItem('bgl_user', res.username);
                // ...
            }
        });

        // "Yazır..." funksiyası
        msgInput.onkeypress = () => {
            socket.emit('typing', { to: currentChatTarget, from: myName });
        };
        socket.on('typing', (data) => {
            document.getElementById('typing-indicator').innerText = `${data.from} yazır...`;
            document.getElementById('typing-indicator').style.display = 'block';
            setTimeout(() => { document.getElementById('typing-indicator').style.display = 'none'; }, 2000);
        });

        // Səsin açılması
        function playAudio(base64) {
            const audio = new Audio(base64);
            audio.play();
        }
    </script>
</body>
</html>
