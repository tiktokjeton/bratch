<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bgl_</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* GİRİŞ və QEYDİYYAT EKRANI */
        #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:25px; }
        .logo { font-size: 42px; font-weight: bold; font-style: italic; letter-spacing: -1px; margin-bottom: 30px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-input { width: 100%; max-width: 320px; padding: 14px; background: #121212; border: 1px solid #262626; border-radius: 8px; color: #fff; margin-bottom: 12px; font-size: 14px; outline: none; }
        .auth-btn { width: 100%; max-width: 320px; padding: 14px; background: #0095f6; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: background 0.2s; }
        .auth-btn:disabled { background: #004c8c; cursor: not-allowed; color: #a8a8a8; }
        .toggle-auth { margin-top: 20px; color: #a8a8a8; font-size: 13px; cursor: pointer; }

        /* ƏSAS INTERFEYS */
        #app-header { height: 50px; border-bottom: 1px solid #262626; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 22px; font-weight: bold; font-style: italic; }
        .notification-btn { position: relative; cursor: pointer; display: flex; align-items: center; }
        .notification-badge { position: absolute; top: -2px; right: -4px; background: #dc2743; color: #fff; font-size: 10px; font-weight: bold; border-radius: 50%; padding: 2px 5px; font-style: normal; }
        #main-container { flex: 1; overflow-y: auto; display: block; padding-bottom: 65px; position: relative; }

        /* İSTİFADƏÇİ SİYAHISI (Axtarış) */
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #121212; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #262626; object-fit: cover; border: 1px solid #333; }
        .user-details .username { font-weight: bold; font-size: 14px; font-style: normal; }
        .user-details .sub { font-size: 12px; color: #a8a8a8; }
        .action-btns { display: flex; gap: 8px; }
        .follow-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
        .follow-btn.get { background: #0095f6; color: #fff; }
        .follow-btn.ing { background: #262626; color: #fff; border: 1px solid #333; }
        .chat-open-btn { background: #fff; color: #000; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }

        /* KEŞFET (Explore) EKRANI */
        #explore-screen { display: none; padding: 10px 0; }
        .explore-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px 15px 15px; }
        .new-post-btn { background: #0095f6; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .post-card { background: #000; border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 15px; }
        .post-header { display: flex; align-items: center; gap: 10px; padding: 10px 15px; }
        .post-header .avatar { width: 35px; height: 35px; }
        .post-image { width: 100%; max-height: 500px; object-fit: cover; background: #121212; }
        .post-actions { padding: 10px 15px; display: flex; gap: 15px; font-size: 22px; }
        .post-action-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .post-caption { padding: 0 15px; font-size: 14px; margin-bottom: 5px; }
        .post-comments { padding: 0 15px; font-size: 13px; color: #a8a8a8; cursor: pointer; }
        .comment-input-box { display: flex; padding: 10px 15px; gap: 10px; }
        .comment-input-box input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 14px; }
        .comment-input-box button { background: none; border: none; color: #0095f6; font-weight: bold; cursor: pointer; }

        /* ÖZƏL CHAT EKRANI */
        #chat-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; flex-direction: column; }
        #chat-header { height: 55px; border-bottom: 1px solid #262626; display: flex; align-items: center; padding: 0 15px; gap: 15px; z-index: 2; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        #chat-back { font-size: 24px; cursor: pointer; padding-right: 5px; }
        
        /* ÇAT ARXA FONLARI */
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; position: relative; transition: background 0.3s ease; }
        .theme-default { background: #000; }
        .theme-ig { background: linear-gradient(145deg, #000000 0%, #170d21 50%, #000000 100%); }
        .theme-tg { background: linear-gradient(180deg, #17212b 0%, #0e1621 100%); }

        .msg-line { display: flex; width: 100%; z-index: 1; }
        .msg-line.me { justify-content: flex-end; }
        .msg-line.other { justify-content: flex-start; }
        .bubble { padding: 10px 16px; border-radius: 20px; max-width: 70%; font-size: 14px; word-break: break-word; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .msg-line.me .bubble { background: #3797f0; color: #fff; border-bottom-right-radius: 4px; }
        .msg-line.other .bubble { background: #262626; color: #fff; border-bottom-left-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .bubble audio { max-width: 100%; margin-top: 5px; outline: none; }
        #chat-input-bar { padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #262626; background: #000; z-index: 2;}
        #msg-input { flex: 1; padding: 12px 18px; background: #121212; border: 1px solid #262626; border-radius: 25px; color: #fff; outline: none; font-size: 14px; }
        .media-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; transition: transform 0.1s ease; }
        .media-btn:active { transform: scale(0.75); }
        #send-btn { background: none; border: none; color: #0095f6; font-size: 16px; font-weight: bold; cursor: pointer; display: none; }

        /* Status & Göstəricilər */
        #action-indicator { display: none; padding: 5px 15px; font-size: 12px; font-style: italic; background: #000; border-top: 1px solid #121212; }
        .status-online { color: #4caf50; font-size: 11px; }
        .status-offline { color: #f44336; font-size: 11px; }

        /* PROFİL EKRANI (MƏNİM VƏ BAŞQASININ) */
        #profile-screen, #other-profile-screen { padding: 20px; display: none; text-align: center; height: 100%; }
        #other-profile-screen { position: absolute; top: 0; left: 0; width: 100%; background: #000; z-index: 600; }
        .profile-avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #262626; }
        .avatar-edit-label { position: absolute; bottom: 0; right: 0; background: #0095f6; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
        
        /* Profil Statistikaları */
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-num { font-size: 18px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 13px; color: #a8a8a8; }

        .bio-input-box { width: 100%; max-width: 250px; padding: 10px; margin-top: 10px; background: #121212; border: 1px solid #262626; border-radius: 8px; color: #fff; text-align: center; outline: none; }
        .bio-btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        .bio-btn.edit { background: #262626; color: #fff; }
        .bio-btn.save { background: #0095f6; color: #fff; }

        /* AŞAĞI MENYU (NAVBAR) */
        #bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 400; }
        .nav-item { background: none; border: none; color: #a8a8a8; font-size: 22px; cursor: pointer; width: 33%; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="logo">Bgl_</div>
        <input type="text" id="auth-user" class="auth-input" placeholder="İstifadəçi adı...">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Şifrə...">
        <button id="auth-main-btn" class="auth-btn">Giriş Et</button>
        <div id="auth-toggle" class="toggle-auth">Hesabın yoxdur? Qeydiyyatdan keç</div>
    </div>

    <div id="app-header">
        <span>Bgl_</span>
        <div class="notification-btn">
            <span style="font-size: 22px;">🔔</span>
            <span class="notification-badge">3</span>
        </div>
    </div>

    <div id="main-container">
        <div id="users-screen"></div>

        <div id="explore-screen">
            <div class="explore-header">
                <h3>Keşfet</h3>
                <button class="new-post-btn" onclick="document.getElementById('post-upload').click()">Şəkil Paylaş</button>
                <input type="file" id="post-upload" accept="image/*" style="display: none;">
            </div>
            <div id="posts-container">
                <p style="text-align: center; color: #a8a8a8; font-size: 14px; margin-top: 20px;">Hələlik heç bir paylaşım yoxdur...</p>
            </div>
        </div>

        <div id="profile-screen">
            <div class="profile-avatar-container">
                <img id="my-profile-img" class="profile-avatar" src="https://www.w3schools.com/howto/img_avatar.png">
                <label for="avatar-upload" class="avatar-edit-label">+</label>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
            </div>
            <h2 id="my-profile-name" style="margin-bottom: 5px;">İstifadəçi</h2>
            
            <div class="profile-stats">
                <div class="stat-box"><span class="stat-num" id="my-posts-count">0</span><span class="stat-label">Post</span></div>
                <div class="stat-box"><span class="stat-num" id="my-followers-count">0</span><span class="stat-label">İzləyici</span></div>
                <div class="stat-box"><span class="stat-num" id="my-following-count">0</span><span class="stat-label">İzləyir</span></div>
            </div>

            <p id="my-bio-text" style="color: #a8a8a8; margin-bottom: 10px; font-size: 14px; word-wrap: break-word;">Bgl_ dünyasına xoş gəldin, brat!</p>
            <div id="bio-edit-container" style="display: none;">
                <input type="text" id="bio-input" class="bio-input-box" placeholder="Bio yaz..."><br>
                <button id="save-bio-btn" class="bio-btn save">Yadda saxla</button>
            </div>
            <button id="edit-bio-btn" class="bio-btn edit">Bionu dəyiş</button>
        </div>

        <div id="other-profile-screen">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
                <span onclick="closeOtherProfile()" style="font-size: 24px; cursor: pointer;">🡠</span>
                <span style="font-weight: bold; font-size: 18px;">Profil</span>
                <span style="width: 24px;"></span> 
            </div>
            <div class="profile-avatar-container">
                <img id="other-profile-img" class="profile-avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            </div>
            <h2 id="other-profile-name" style="margin-bottom: 10px;">İstifadəçi</h2>
            
            <div class="profile-stats">
                <div class="stat-box"><span class="stat-num" id="other-posts-count">0</span><span class="stat-label">Post</span></div>
                <div class="stat-box"><span class="stat-num" id="other-followers-count">0</span><span class="stat-label">İzləyici</span></div>
                <div class="stat-box"><span class="stat-num" id="other-following-count">0</span><span class="stat-label">İzləyir</span></div>
            </div>

            <button id="other-profile-follow-btn" class="follow-btn get" style="padding: 10px 25px; font-size: 14px;" onclick="toggleFollow(this, document.getElementById('other-profile-name').innerText)">İzlə</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <span id="chat-back">🡠</span>
            <div style="display: flex; align-items: center; gap: 15px; cursor: pointer; flex: 1;" onclick="openOtherProfileFromChat()">
                <img id="chat-target-avatar" class="avatar" src="" style="width:35px; height:35px;">
                <div style="display: flex; flex-direction: column;">
                    <span id="chat-target-name" style="font-weight: bold;">Ad</span>
                    <span id="chat-target-status" class="status-online">Online</span>
                </div>
            </div>
            <button id="chat-theme-btn" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="toggleChatTheme()">🎨</button>
        </div>
        <div id="chat-messages" class="theme-default"></div>
        <div id="action-indicator"></div>
        <div id="chat-input-bar">
            <label for="img-file-input" class="media-btn">📷</label>
            <input type="file" id="img-file-input" accept="image/*" style="display:none;">
            <button id="audio-rec-btn" class="media-btn">🎙️</button>
            <input type="text" id="msg-input" placeholder="Mesaj yaz..." autocomplete="off">
            <button id="send-btn">Göndər</button>
        </div>
    </div>

    <div id="bottom-nav">
        <button class="nav-item active" onclick="switchTab('search')">🔍</button>
        <button class="nav-item" onclick="switchTab('explore')">🧭</button>
        <button class="nav-item" onclick="switchTab('profile')">👤</button>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const SERVER_URL = "https://bratch.onrender.com"; 
        const socket = io(SERVER_URL);

        let myName = "";
        let currentChatTarget = "";
        let authType = "login"; 
        let mediaRecorder;
        let audioChunks = [];
        let typingTimeout; 

        // Elementlər
        const authScreen = document.getElementById("auth-screen");
        const authUser = document.getElementById("auth-user");
        const authPass = document.getElementById("auth-pass");
        const authMainBtn = document.getElementById("auth-main-btn");
        const authToggle = document.getElementById("auth-toggle");
        const usersScreen = document.getElementById("users-screen");
        const exploreScreen = document.getElementById("explore-screen");
        const profileScreen = document.getElementById("profile-screen");
        const otherProfileScreen = document.getElementById("other-profile-screen");
        const postsContainer = document.getElementById("posts-container");

        // Bio Elementləri
        const bioText = document.getElementById("my-bio-text");
        const bioInput = document.getElementById("bio-input");
        const bioEditContainer = document.getElementById("bio-edit-container");
        const editBioBtn = document.getElementById("edit-bio-btn");
        const saveBioBtn = document.getElementById("save-bio-btn");

        if(localStorage.getItem("my_bgl_bio")) bioText.innerText = localStorage.getItem("my_bgl_bio");

        editBioBtn.onclick = () => {
            bioText.style.display = "none";
            editBioBtn.style.display = "none";
            bioEditContainer.style.display = "block";
            bioInput.value = bioText.innerText;
        };

        saveBioBtn.onclick = () => {
            const newBio = bioInput.value.trim();
            bioText.innerText = newBio || "Bgl_ dünyasına xoş gəldin, brat!";
            localStorage.setItem("my_bgl_bio", bioText.innerText);
            bioEditContainer.style.display = "none";
            bioText.style.display = "block";
            editBioBtn.style.display = "inline-block";
        };

        // 1. GİRİŞ / QEYDİYYAT
        authToggle.onclick = () => {
            if(authType === "login") {
                authType = "register";
                authMainBtn.innerText = "Qeydiyyatı Tamamla";
                authToggle.innerText = "Hesabın var? Giriş et";
            } else {
                authType = "login";
                authMainBtn.innerText = "Giriş Et";
                authToggle.innerText = "Hesabın yoxdur? Qeydiyyatdan keç";
            }
        };

        authMainBtn.onclick = () => {
            const username = authUser.value.trim().toLowerCase();
            const password = authPass.value.trim();
            if(username && password) {
                authMainBtn.innerText = "Sistemə daxil olunur, zəhmət olmasa gözləyin...";
                authMainBtn.disabled = true;
                socket.emit('auth', { type: authType, username, password });
            }
        };

        socket.on('auth_response', (res) => {
            authMainBtn.disabled = false;
            authMainBtn.innerText = authType === "login" ? "Giriş Et" : "Qeydiyyatı Tamamla";

            if(res.success) {
                myName = res.username;
                authScreen.style.display = "none";
                document.getElementById("my-profile-name").innerText = myName;
                socket.emit('get_users');
            } else {
                if(authType === "login") {
                    alert("Hesabınız tapılmadı və ya şifrə səhvdir.");
                } else {
                    alert(res.message || "Xəta baş verdi, yenidən cəhd edin.");
                }
            }
        });

        // 2. TAB KONTROLU
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            usersScreen.style.display = "none";
            exploreScreen.style.display = "none";
            profileScreen.style.display = "none";
            otherProfileScreen.style.display = "none"; // Başqasının profilini bağla

            if(tab === 'search') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                usersScreen.style.display = "block";
                socket.emit('get_users');
            } else if(tab === 'explore') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                exploreScreen.style.display = "block";
                socket.emit('get_explore_posts'); 
            } else {
                document.querySelectorAll('.nav-item')[2].classList.add('active');
                profileScreen.style.display = "block";
            }
        }

        // 3. KEŞFET 
        document.getElementById("post-upload").onchange = function() {
            const file = this.files[0];
            if(file) {
                const desc = prompt("Bu şəkil üçün bir açıqlama yaz:");
                const reader = new FileReader();
                reader.onload = function(e) {
                    const postData = { author: myName, image: e.target.result, description: desc || "", timestamp: new Date().getTime() };
                    renderPost(postData);
                    socket.emit('create_post', postData);
                };
                reader.readAsDataURL(file);
            }
        };

        function renderPost(post) {
            if(postsContainer.innerHTML.includes("Hələlik heç bir paylaşım yoxdur")) {
                postsContainer.innerHTML = "";
            }
            const postEl = document.createElement("div");
            postEl.className = "post-card";
            postEl.innerHTML = `
                <div class="post-header">
                    <img class="avatar" src="https://www.w3schools.com/howto/img_avatar.png">
                    <div style="font-weight:bold; font-size:14px;">${post.author}</div>
                </div>
                <img class="post-image" src="${post.image}">
                <div class="post-actions">
                    <button class="post-action-btn" onclick="toggleLikePost(this)">🤍</button>
                    <button class="post-action-btn">💬</button>
                </div>
                <div class="post-caption">
                    <strong>${post.author}</strong> ${post.description}
                </div>
                <div class="post-comments">Koment yazmaq üçün kliklə...</div>
                <div class="comment-input-box">
                    <input type="text" placeholder="Koment yaz...">
                    <button onclick="addComment(this)">Paylaş</button>
                </div>
            `;
            postsContainer.prepend(postEl);
        }

        socket.on('explore_posts', (posts) => {
            postsContainer.innerHTML = "";
            if(posts.length === 0) {
                postsContainer.innerHTML = `<p style="text-align: center; color: #a8a8a8; font-size: 14px; margin-top: 20px;">Hələlik heç bir paylaşım yoxdur...</p>`;
            } else {
                posts.reverse().forEach(post => renderPost(post));
            }
        });

        function toggleLikePost(btn) {
            if(btn.innerText === "🤍") { btn.innerText = "❤️"; btn.style.color = "#dc2743"; } 
            else { btn.innerText = "🤍"; btn.style.color = "#fff"; }
        }

        function addComment(btn) {
            const input = btn.previousElementSibling;
            if(input.value.trim() !== "") {
                const commentBox = btn.parentElement.previousElementSibling;
                const newComment = document.createElement("div");
                newComment.style.color = "#fff";
                newComment.innerHTML = `<strong>${myName}</strong> ${input.value}`;
                if(commentBox.innerText === "Koment yazmaq üçün kliklə...") commentBox.innerText = "";
                commentBox.appendChild(newComment);
                input.value = "";
            }
        }

        // 4. İZLƏMƏ SİSTEMİ (FOLLOW)
        function toggleFollow(btn, targetUser) {
            if(btn.innerText === "İzlə") {
                btn.innerText = "İzləyirsən";
                btn.classList.remove("get");
                btn.classList.add("ing");
                socket.emit("follow_user", { target: targetUser });
            } else {
                btn.innerText = "İzlə";
                btn.classList.remove("ing");
                btn.classList.add("get");
                socket.emit("unfollow_user", { target: targetUser });
            }
        }

        // 5. BAŞQASININ PROFİLİNİ AÇMAQ
        function openOtherProfileFromChat() {
            chatScreen.style.display = "none";
            otherProfileScreen.style.display = "block";
            
            document.getElementById("other-profile-img").src = document.getElementById("chat-target-avatar").src;
            document.getElementById("other-profile-name").innerText = currentChatTarget;
            
            // Serverdən dəyərlər gələnə qədər sıfırlayırıq
            document.getElementById("other-posts-count").innerText = "0";
            document.getElementById("other-followers-count").innerText = "0";
            document.getElementById("other-following-count").innerText = "0";
        }

        function closeOtherProfile() {
            otherProfileScreen.style.display = "none";
            if(currentChatTarget !== "") {
                chatScreen.style.display = "flex";
            }
        }

        // 6. ÇAT ARXA FONLARI (YENİLƏNDİ)
        const chatThemes = ['theme-default', 'theme-ig', 'theme-tg'];
        let currentThemeIndex = 0;
        function toggleChatTheme() {
            const msgBox = document.getElementById("chat-messages");
            msgBox.classList.remove(chatThemes[currentThemeIndex]);
            currentThemeIndex = (currentThemeIndex + 1) % chatThemes.length;
            msgBox.classList.add(chatThemes[currentThemeIndex]);
        }

        // ==============================================
        // MESAJLAŞMA VƏ USER LIST
        // ==============================================
        const chatScreen = document.getElementById("chat-screen");
        const chatTargetName = document.getElementById("chat-target-name");
        const chatTargetAvatar = document.getElementById("chat-target-avatar");
        const chatTargetStatus = document.getElementById("chat-target-status");
        const chatMessages = document.getElementById("chat-messages");
        const msgInput = document.getElementById("msg-input");
        const sendBtn = document.getElementById("send-btn");
        const imgFileInput = document.getElementById("img-file-input");
        const audioRecBtn = document.getElementById("audio-rec-btn");
        const actionIndicator = document.getElementById("action-indicator");

        socket.on('user_list', (list) => {
            usersScreen.innerHTML = "";
            list.forEach(user => {
                if(user.username === myName) {
                    if(user.avatar) document.getElementById("my-profile-img").src = user.avatar;
                    return;
                }
                const card = document.createElement("div");
                card.className = "user-card";
                const imgSrc = user.avatar || "https://www.w3schools.com/howto/img_avatar.png";
                
                card.innerHTML = `
                    <div class="user-info">
                        <img class="avatar" src="${imgSrc}">
                        <div class="user-details">
                            <div class="username">${user.username}</div>
                            <div class="sub">${user.followersCount || 0} followers</div>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="follow-btn get" onclick="toggleFollow(this, '${user.username}')">İzlə</button>
                        <button class="chat-open-btn" onclick="openChat('${user.username}', '${imgSrc}')">Mesaj</button>
                    </div>
                `;
                usersScreen.appendChild(card);
            });
        });

        function openChat(target, avatarUrl) {
            currentChatTarget = target;
            chatTargetName.innerText = target;
            chatTargetAvatar.src = avatarUrl;
            chatTargetStatus.className = "status-online"; 
            chatTargetStatus.innerText = "Online";
            chatMessages.innerHTML = "";
            chatScreen.style.display = "flex";
            actionIndicator.style.display = "none";
        }

        document.getElementById("chat-back").onclick = () => {
            chatScreen.style.display = "none";
            currentChatTarget = "";
        };

        msgInput.addEventListener('input', () => {
            sendBtn.style.display = msgInput.value.trim() ? "block" : "none";
            if(currentChatTarget) {
                socket.emit('typing', { to: currentChatTarget });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => socket.emit('stop_typing', { to: currentChatTarget }), 2000);
            }
        });

        socket.on('typing', (data) => {
            if(data.from === currentChatTarget) {
                actionIndicator.innerText = `${currentChatTarget} mesaj yazır...`;
                actionIndicator.style.color = "#a8a8a8";
                actionIndicator.style.display = "block";
            }
        });

        socket.on('stop_typing', (data) => {
            if(data.from === currentChatTarget) actionIndicator.style.display = "none";
        });

        socket.on('user_status', (data) => {
            if(data.username === currentChatTarget) {
                chatTargetStatus.innerText = data.online ? "Online" : "Offline";
                chatTargetStatus.className = data.online ? "status-online" : "status-offline";
            }
        });

        function sendTextMessage() {
            const text = msgInput.value.trim();
            if(text && currentChatTarget) {
                socket.emit('private_message', { to: currentChatTarget, text: text, fileType: 'text' });
                msgInput.value = "";
                sendBtn.style.display = "none";
                socket.emit('stop_typing', { to: currentChatTarget });
            }
        }
        sendBtn.onclick = sendTextMessage;
        msgInput.onkeydown = (e) => { if(e.key === "Enter") sendTextMessage(); };

        socket.on('msg_receive', (msg) => {
            if ((msg.from === myName && msg.to === currentChatTarget) || (msg.from === currentChatTarget && msg.to === myName)) {
                const line = document.createElement("div");
                const isMe = msg.from === myName;
                line.className = isMe ? "msg-line me" : "msg-line other";

                let content = "";
                if(msg.fileType === 'text') content = msg.text;
                else if(msg.fileType === 'image') content = `<img src="${msg.text}">`;
                else if(msg.fileType === 'audio') content = `<audio src="${msg.text}" controls></audio>`;

                line.innerHTML = `<div class="bubble">${content}</div>`;
                chatMessages.appendChild(line);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                if(!isMe) actionIndicator.style.display = "none"; 
            }
        });

        imgFileInput.onchange = function() {
            const file = this.files[0];
            if (file && currentChatTarget) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    socket.emit('private_message', { to: currentChatTarget, text: e.target.result, fileType: 'image' });
                };
                reader.readAsDataURL(file);
            }
        };

        audioRecBtn.onclick = () => {
            if(navigator.vibrate) navigator.vibrate(50); 
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            socket.emit('private_message', { to: currentChatTarget, text: e.target.result, fileType: 'audio' });
                        };
                        reader.readAsDataURL(audioBlob);
                        audioRecBtn.style.color = "#fff";
                        actionIndicator.style.display = "none";
                    };
                    
                    mediaRecorder.start();
                    audioRecBtn.style.color = "red"; 
                    actionIndicator.innerText = "Səs yazılır...";
                    actionIndicator.style.color = "#dc2743";
                    actionIndicator.style.display = "block";
                }).catch(err => alert("Mikrofona icazə verilmədi."));
            } else {
                mediaRecorder.stop();
            }
        };

        document.getElementById("avatar-upload").onchange = function() {
            const file = this.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    socket.emit('update_avatar', e.target.result);
                };
                reader.readAsDataURL(file);
            }
        };

        socket.on('avatar_updated', (img) => {
            document.getElementById("my-profile-img").src = img;
            alert("Profil şəklin yeniləndi!");
        });
    </script>
</body>
</html>
