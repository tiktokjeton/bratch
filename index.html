<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        #chat { flex: 1; border: 1px solid #333; background: #1e1e1e; padding: 15px; overflow-y: auto; border-radius: 8px; margin-bottom: 10px; }
        .msg { background: #2b2b2b; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; width: fit-content; max-width: 80%; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; }
        button { padding: 12px 20px; border: none; background: #7289da; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align:center; margin: 5px 0;">Brat Chat 🚀</h2>
    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Mesajı yaz..." autocomplete="off">
        <button onclick="sendMessage()">Göndər</button>
    </div>

    <!-- Socket.io Kitabxanası -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // DİQQƏT: Render bizə link verəndə, həmin linki aşağıdakı dırnağın içinə yapışdıracağıq!
        const SERVER_URL = "BURA_RENDER_LİNKİ_GƏLƏCƏK"; 
        
        const socket = io(SERVER_URL !== "BURA_RENDER_LİNKİ_GƏLƏCƏK" ? SERVER_URL : "http://localhost:3000");

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('messageInput');

        socket.on('chat_message', (data) => {
            const item = document.createElement('div');
            item.className = 'msg';
            item.textContent = data;
            chatDiv.appendChild(item);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        function sendMessage() {
            const message = msgInput.value.trim();
            if (message) {
                socket.emit('chat_message', message);
                msgInput.value = '';
            }
        }

        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") { sendMessage(); }
        });
    </script>
</body>
</html>
